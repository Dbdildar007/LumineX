<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#030308" />
    <meta name="description" content="LumineX — Stream Your World" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <title>LumineX</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #030308; color: #f0f0f8; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0a0a14; }
      ::-webkit-scrollbar-thumb { background: #c084fc; border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
